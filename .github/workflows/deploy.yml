# push main → 以最新版 MyST（Jupyter Book 2 引擎）建置靜態站＋各頁 typst PDF → 部署 GitHub Pages
# Pages 來源＝GitHub Actions（build_type=workflow）
name: deploy-book
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BASE_URL: /${{ github.event.repository.name }}   # 專案站前綴 /eeqt30001

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install MyST
        run: npm install -g mystmd
      - name: Install Typst + CJK fonts   # 各頁 PDF export 用；中文需 Noto CJK
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin --wildcards '*/typst'
          typst --version
      - name: Build static HTML + per-page PDF exports
        run: myst build --all --html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
